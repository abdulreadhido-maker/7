<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إنشاء حساب | Torrema</title>

    <link rel="stylesheet" href="css/style.css">

    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background: #e5e5e5;
        }

        .register-box {
            background: white;
            width: 450px;
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, .2);
        }

        .register-box h1 {
            text-align: center;
            margin-bottom: 30px;
        }

        .input {
            width: 100%;
            padding: 15px;
            margin: 10px 0;
            border: 1px solid #ccc;
            border-radius: 8px;
            font-size: 16px;
            outline: none;
        }

        .input:focus {
            border-color: #111;
        }

        .btn {
            width: 100%;
            padding: 15px;
            background: #111;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 18px;
            margin-top: 20px;
        }

        .btn:hover {
            background: #444;
        }

        .link {
            text-align: center;
            margin-top: 20px;
        }

        .link a {
            text-decoration: none;
            color: #111;
            font-weight: bold;
        }
    </style>
</head>

<body>

    <div class="register-box">
        <h1>إنشاء حساب Torrema</h1>

        <form id="registerForm">
            <input type="text" id="full_name" class="input" placeholder="الاسم الكامل" required>

            <input type="email" id="email" class="input" placeholder="البريد الإلكتروني" required>

            <input type="text" id="username" class="input" placeholder="اسم المستخدم" required>

            <input type="password" id="password" class="input" placeholder="كلمة المرور" required>

            <input type="password" id="confirmPassword" class="input" placeholder="تأكيد كلمة المرور" required>

            <button type="submit" class="btn">إنشاء الحساب</button>
        </form>

        <div class="link">
            لديك حساب بالفعل؟
            <a href="login.html">تسجيل الدخول</a>
        </div>
    </div>

    <script src="js/register.js"></script>

</body>
</html>
